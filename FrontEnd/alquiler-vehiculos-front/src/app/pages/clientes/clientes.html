<div class="contenedor">
  <h1>Gestión de Clientes</h1>

  <div class="tarjeta formulario">
    <h2>{{ modoEditar ? 'Editar Cliente' : 'Registrar Cliente' }}</h2>

    <form (ngSubmit)="guardarCliente()">

      <div class="grupo">
        <label>Nombre</label>
        <input 
          type="text" 
          [(ngModel)]="cliente.nombre" 
          name="nombre" 
          placeholder="Ej: Carlos"
        >
      </div>

      <div class="grupo">
        <label>Apellido</label>
        <input 
          type="text" 
          [(ngModel)]="cliente.apellido" 
          name="apellido" 
          placeholder="Ej: Mendoza"
        >
      </div>

      <div class="grupo">
        <label>Licencia</label>
        <input 
          type="text" 
          [(ngModel)]="cliente.licencia" 
          name="licencia" 
          placeholder="Ej: LIC-001"
        >
      </div>

      <div class="grupo">
        <label>Teléfono</label>
        <input 
          type="text" 
          [(ngModel)]="cliente.telefono" 
          name="telefono" 
          placeholder="Ej: 0987654321"
        >
      </div>

      <div class="botones">
        <button type="submit" class="btn guardar">
          {{ modoEditar ? 'Actualizar' : 'Guardar' }}
        </button>

        <button type="button" class="btn cancelar" (click)="limpiarFormulario()">
          Cancelar
        </button>
      </div>

    </form>
  </div>

  <div class="tarjeta">
    <div class="encabezado-lista">
      <h2>Lista de Clientes</h2>

      <button type="button" class="btn actualizar" (click)="cargarClientes()">
        Actualizar lista
      </button>
    </div>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Apellido</th>
          <th>Licencia</th>
          <th>Teléfono</th>
          <th>Acciones</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let c of clientes">
          <td>{{ c.clienteId }}</td>
          <td>{{ c.nombre }}</td>
          <td>{{ c.apellido }}</td>
          <td>{{ c.licencia }}</td>
          <td>{{ c.telefono }}</td>
          <td>
            <button type="button" class="btn editar" (click)="editarCliente(c)">
              Editar
            </button>

            <button type="button" class="btn eliminar" (click)="eliminarCliente(c.clienteId)">
              Eliminar
            </button>
          </td>
        </tr>
      </tbody>
    </table>

    <p *ngIf="clientes.length === 0" class="vacio">
      No hay clientes registrados.
    </p>
  </div>
</div>
